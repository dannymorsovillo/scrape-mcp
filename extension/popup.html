<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 18px 16px;
        border-top: 4px solid #e8112d;
        font: 13px/1.4 system-ui, sans-serif;
        color: #1a1a1a;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      #tagline {
        margin: 0 0 14px;
        font-size: 12px;
        color: #6b6b6b;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        color: #333;
      }
      .row:last-child {
        margin-bottom: 0;
      }
      #status {
        margin-bottom: 14px;
        padding: 12px;
        border-radius: 8px;
        background: #f4f4f4;
      }
      /* The agent is reported by the server, so it can't be known while the
         bridge is down — show it as unknown rather than as absent. */
      #status.offline #agent {
        color: #aaa;
      }
      #status.offline #agent-dot {
        background: #bbb;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #e8112d;
        flex: none;
      }
      .dot.on {
        background: #1a9e4b;
      }
      button {
        width: 100%;
        padding: 10px;
        margin-bottom: 8px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: #e8112d;
        color: #fff;
        font: 600 13px/1.2 system-ui, sans-serif;
        cursor: pointer;
      }
      button:hover {
        background: #cc0f28;
      }
      button.active {
        background: #1a1a1a;
      }
      button.active:hover {
        background: #333;
      }
      #clear {
        border-color: #d5d5d5;
        background: #fff;
        color: #1a1a1a;
      }
      #clear:hover {
        background: #f4f4f4;
      }
      #error {
        margin: 6px 0 0;
        color: #e8112d;
        font-size: 12px;
      }
      #error:empty {
        display: none;
      }
      h2 {
        margin: 0 0 10px;
        padding-top: 14px;
        border-top: 1px solid #e2e2e2;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      #list {
        max-height: 260px;
        overflow-y: auto;
        margin: 0 -4px;
      }
      .ep {
        padding: 5px 4px;
        border-top: 1px solid #eee;
      }
      .ep-top {
        display: flex;
        align-items: baseline;
        gap: 5px;
      }
      .verb {
        font: 600 10px/1 ui-monospace, monospace;
        color: #666;
        flex: none;
      }
      .path {
        font: 11px/1.3 ui-monospace, monospace;
        word-break: break-all;
      }
      .count {
        margin-left: auto;
        flex: none;
        font-size: 10px;
        color: #999;
      }
      .host {
        font-size: 10px;
        color: #999;
        word-break: break-all;
      }
      .lock {
        font-size: 9px;
        color: #b80;
      }
      #empty {
        padding: 12px;
        border-radius: 8px;
        background: #f4f4f4;
        font-size: 12px;
      }
      #empty b {
        display: block;
        margin-bottom: 3px;
        font-weight: 600;
      }
      #empty span {
        color: #6b6b6b;
      }
    </style>
  </head>
  <body>
    <h1>Scrape MCP</h1>
    <p id="tagline">Capture website APIs for your agent</p>
    <div id="status">
      <div class="row"><span class="dot" id="dot"></span><span id="conn">Bridge offline</span></div>
      <div class="row"><span class="dot" id="agent-dot"></span><span id="agent">No agent attached</span></div>
    </div>
    <button id="toggle">Start capturing</button>
    <button id="clear">Clear captured</button>
    <p id="error"></p>
    <h2 id="heading">Endpoints</h2>
    <div id="empty">
      <b>Nothing captured yet</b>
      <span>Start capturing, then use the current tab.</span>
    </div>
    <div id="list"></div>
    <script src="popup.js"></script>
  </body>
</html>
