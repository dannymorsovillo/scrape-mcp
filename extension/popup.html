<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        margin: 0;
        padding: 14px;
        font: 13px/1.4 system-ui, sans-serif;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 600;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
        color: #555;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c33;
        flex: none;
      }
      .dot.on {
        background: #2a2;
      }
      button {
        width: 100%;
        padding: 7px;
        margin-bottom: 6px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background: #f6f6f6;
        font: inherit;
        cursor: pointer;
      }
      button:hover {
        background: #eee;
      }
      button.active {
        border-color: #2a2;
        color: #2a2;
      }
      #error {
        margin: 6px 0 0;
        color: #c33;
        font-size: 12px;
      }
      #error:empty {
        display: none;
      }
      h2 {
        margin: 12px 0 6px;
        font-size: 11px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #list {
        max-height: 260px;
        overflow-y: auto;
        margin: 0 -4px;
      }
      .ep {
        padding: 5px 4px;
        border-top: 1px solid #eee;
      }
      .ep-top {
        display: flex;
        align-items: baseline;
        gap: 5px;
      }
      .verb {
        font: 600 10px/1 ui-monospace, monospace;
        color: #666;
        flex: none;
      }
      .path {
        font: 11px/1.3 ui-monospace, monospace;
        word-break: break-all;
      }
      .count {
        margin-left: auto;
        flex: none;
        font-size: 10px;
        color: #999;
      }
      .host {
        font-size: 10px;
        color: #999;
        word-break: break-all;
      }
      .lock {
        font-size: 9px;
        color: #b80;
      }
      #empty {
        color: #999;
        font-size: 12px;
        padding: 4px 0;
      }
    </style>
  </head>
  <body>
    <h1>Scrape MCP</h1>
    <div class="row"><span class="dot" id="dot"></span><span id="conn">Bridge offline</span></div>
    <button id="toggle">Start capturing</button>
    <button id="clear">Clear captured</button>
    <p id="error"></p>
    <h2 id="heading">Endpoints</h2>
    <div id="empty">Nothing captured yet.</div>
    <div id="list"></div>
    <script src="popup.js"></script>
  </body>
</html>
